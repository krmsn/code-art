<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOM v0.1.1 DOMINANT COLOR CYCLE</title>
<style>
  html,body{margin:0;height:100%;background:#050608;overflow:hidden;}
  body{font-family:"SF Mono",Menlo,Consolas,monospace;cursor:crosshair;}
  canvas{display:block;position:fixed;inset:0;}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;
    background:repeating-linear-gradient(to bottom,rgba(255,255,255,.018),
    rgba(255,255,255,.018) 1px,transparent 1px,transparent 3px);
    mix-blend-mode:overlay;opacity:.45;}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
"use strict";
/* ============================================================
   LOOM — series #13 (13_loom) / v0.1.1 DOMINANT COLOR CYCLE
   An autonomous drafting machine. Scribe-agents deposit
   PERMANENT ink — nothing decays, nothing flows, nothing is
   ever erased. Hue advances with completion inside a narrow per-cycle band,
   so each finished weave holds one dominant color theme while
   still recording its own build order. At 82% coverage the
   machine seals the border, signs the work, and HALTS.
   A generative artwork with an ending.
   Deterministic per hash on a fixed 30-tick clock.
   ============================================================ */

/* ---------- seeded PRNG / hash noise ---------- */
function cyrb128(str){let h1=1779033703,h2=3144134277,h3=1013904242,h4=2773480762;
  for(let i=0,k;i<str.length;i++){k=str.charCodeAt(i);
    h1=h2^Math.imul(h1^k,597399067);h2=h3^Math.imul(h2^k,2869860233);
    h3=h4^Math.imul(h3^k,951274213);h4=h1^Math.imul(h4^k,2716044179);}
  h1=Math.imul(h3^(h1>>>18),597399067);h2=Math.imul(h4^(h2>>>22),2869860233);
  h3=Math.imul(h1^(h3>>>17),951274213);h4=Math.imul(h2^(h4>>>19),2716044179);
  h1^=h2^h3^h4;h2^=h1;h3^=h1;h4^=h1;return[h1>>>0,h2>>>0,h3>>>0,h4>>>0];}
function sfc32(a,b,c,d){return function(){a>>>=0;b>>>=0;c>>>=0;d>>>=0;
  let t=(a+b)|0;a=b^b>>>9;b=c+(c<<3)|0;c=(c<<21|c>>>11)|0;d=d+1|0;t=t+d|0;c=c+t|0;
  return(t>>>0)/4294967296;};}
const B58="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
function newHash(){let s="oo";for(let i=0;i<49;i++)s+=B58[Math.floor(Math.random()*B58.length)];return s;}
function makeR(h){const s=cyrb128(h);return sfc32(s[0],s[1],s[2],s[3]);}

/* ---------- color: harmonic spectrum keyed to completion ---------- */
function hsl(h,s,l){
  h=((h%360)+360)%360;
  const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m2=l-c/2;
  let r,g,b;
  if(h<60){r=c;g=x;b=0;}else if(h<120){r=x;g=c;b=0;}
  else if(h<180){r=0;g=c;b=x;}else if(h<240){r=0;g=x;b=c;}
  else if(h<300){r=x;g=0;b=c;}else{r=c;g=0;b=x;}
  return[Math.floor((r+m2)*255),Math.floor((g+m2)*255),Math.floor((b+m2)*255)];
}
const HEX="0123456789ABCDEF";

/* ---------- grid ---------- */
const CW=10,CH=16,TICK_MS=1000/30;
let cols,rows,N;
let chG,rG,gG,bG,ageG,voidM;     // permanent ink + reservation mask
const cv=document.getElementById("cv"),ctx=cv.getContext("2d");

/* ---------- machine state ---------- */
let HASH,R,tick=0,acc=0,lastT=0;
let scribes=[],nextId=0;
let HUE_BASE=0,HUE_SPAN=280,HARMONY="TRIAD",HARM_OFF=120;
let inked=0,usable=1,coverage=0;
let phase="WEAVING";              // WEAVING -> FINAL -> HALT -> UNWEAVE -> (next cycle)
let tempo=8;                      // scribe acts every `tempo` ticks (keys 1/2/3)
let hud={msg:"",until:0};
const TARGET=0.82;
let cycle=0,BASE0=0,haltAt=0;
const HALT_DWELL=1350;            // ~45s presenting the finished plate
const SCRUB_TICKS=1050;           // ~35s unweaving
let scrubClock=0,scrubStep=1,scrubMin=0;
let embers=[];

function build(hash){
  HASH=hash;
  BASE0=makeR(HASH+":base")()*360;
  tick=0;cycle=0;nextId=0;
  startCycle();
}

/* one full weave-life: theme by golden-angle rotation — consecutive
   cycles maximally distinct, the whole spectrum covered over time */
function startCycle(){
  const cr=makeR(HASH+":c"+cycle);
  R=cr;
  HUE_BASE=(BASE0+cycle*137.508)%360;
  HUE_SPAN=(25+cr()*40)*(cr()<0.5?1:-1);
  HARMONY=["COMPLEMENT","TRIAD","SPLIT","ANALOG"][Math.floor(cr()*4)];
  HARM_OFF=HARMONY==="COMPLEMENT"?180:HARMONY==="TRIAD"?120:HARMONY==="SPLIT"?150:45;
  inked=0;coverage=0;phase="WEAVING";scribes=[];finalStep=0;embers=[];
  chG.fill(0);rG.fill(0);gG.fill(0);bG.fill(0);ageG.fill(0);voidM.fill(0);
  ctx.fillStyle="#050608";ctx.fillRect(0,0,cols*CW,rows*CH);

  /* VOIDKEEPER: reserve negative space before anything is inked */
  const nv=2+Math.floor(cr()*3);
  let voidArea=0;
  for(let v=0;v<nv;v++){
    const w=Math.floor(cols*(0.08+cr()*0.14)),h=Math.floor(rows*(0.08+cr()*0.16));
    const x=2+Math.floor(cr()*(cols-w-4)),y=2+Math.floor(cr()*(rows-h-4));
    for(let yy=y;yy<y+h;yy++)for(let xx=x;xx<x+w;xx++){
      if(!voidM[xx+yy*cols]){voidM[xx+yy*cols]=1;voidArea++;}
    }
  }
  usable=N-voidArea;

  /* the founding crew (streams keyed by cycle for determinism) */
  const K=10+Math.floor(cr()*5);
  for(let i=0;i<K;i++)spawnScribe(null,null,null);
  hud={msg:"CYCLE "+String(cycle).padStart(3,"0")+" · "+K+" SCRIBES · "+HARMONY,until:tick+110};
}

const TYPES=["TRACER","TRACER","TRACER","MASON","MASON","SCRIBE","JOINER"];
function spawnScribe(x,y,type){
  const rng=makeR(HASH+":c"+cycle+":s"+(nextId));
  const s={
    id:nextId++,
    x:x===null||x===undefined?Math.floor(rng()*cols):x,
    y:y===null||y===undefined?Math.floor(rng()*rows):y,
    dir:Math.floor(rng()*4),
    type:type||TYPES[Math.floor(rng()*TYPES.length)],
    rng, life:200+Math.floor(rng()*500),
    st:{}                          // per-type scratch
  };
  scribes.push(s);
  return s;
}

/* ---------- ink ---------- */
function curHue(){return HUE_BASE+coverage*HUE_SPAN;}
function inkColor(accent,rng){
  const h=curHue()+(accent?HARM_OFF:0)+(rng?(rng()-0.5)*14:0);
  return hsl(h,1,accent?0.60:0.55);
}
function ink(x,y,ch,col){
  if(x<1||y<1||x>=cols-1||y>=rows-2)return false;
  const i=x+y*cols;
  if(voidM[i])return false;
  if(chG[i]!==0)return false;
  chG[i]=ch.charCodeAt(0);
  rG[i]=col[0];gG[i]=col[1];bG[i]=col[2];
  ageG[i]=tick;
  inked++;
  return true;
}
/* weave: a TRACER may cross an existing perpendicular line as a junction */
function junction(x,y){
  const i=x+y*cols;
  if(voidM[i]||chG[i]===0)return false;
  const c=String.fromCharCode(chG[i]);
  if(c!=="─"&&c!=="│"&&c!=="═"&&c!=="║")return false;
  chG[i]="┼".charCodeAt(0);
  ageG[i]=tick;
  return true;
}
const DX=[1,0,-1,0],DY=[0,1,0,-1];

/* ---------- scribe behaviors ---------- */
function stepScribe(s){
  const r=s.rng;
  if(s.type==="TRACER")stepTracer(s,r);
  else if(s.type==="MASON")stepMason(s,r);
  else if(s.type==="SCRIBE")stepWriter(s,r);
  else stepJoiner(s,r);
  if(--s.life<=0)retire(s);
}
function retire(s){
  /* leave an end pad; the machine keeps its crew size */
  ink(s.x,s.y,"■",inkColor(true,s.rng));
  const idx=scribes.indexOf(s);
  if(idx>=0)scribes.splice(idx,1);
  if(phase==="WEAVING")spawnScribe(null,null,null);
}

function stepTracer(s,r){
  if(r()<0.09){s.dir=(s.dir+(r()<0.5?1:3))%4;ink(s.x,s.y,"┼",inkColor(false,r));}
  const nx=s.x+DX[s.dir],ny=s.y+DY[s.dir];
  const ch=(s.dir%2===0)?(r()<0.12?"═":"─"):(r()<0.12?"║":"│");
  if(ink(nx,ny,ch,inkColor(false,r))){s.x=nx;s.y=ny;return;}
  /* blocked: try weaving through as a junction, else turn */
  if(r()<0.4&&junction(nx,ny)){s.x=nx;s.y=ny;return;}
  s.dir=(s.dir+(r()<0.5?1:3))%4;
  if(r()<0.15)teleport(s,r);
}
function stepMason(s,r){
  if(!s.st.w){
    s.st.w=3+Math.floor(r()*9);s.st.h=2+Math.floor(r()*4);
    s.st.i=0;s.st.fill=r()<0.5?"▓":"█";s.st.acc=r()<0.3;
  }
  const w=s.st.w,h=s.st.h;
  const lx=s.x+(s.st.i%w),ly=s.y+Math.floor(s.st.i/w);
  ink(lx,ly,s.st.fill,inkColor(s.st.acc,r));
  s.st.i++;
  if(s.st.i>=w*h){s.st={};teleport(s,r);}
}
function stepWriter(s,r){
  if(!s.st.n){s.st.n=4+Math.floor(r()*10);}
  const ch=r()<0.7?HEX[Math.floor(r()*16)]:(r()<0.5?":":"·");
  if(!ink(s.x,s.y,ch,inkColor(r()<0.15,r)))s.x++;
  s.x++;s.st.n--;
  if(s.st.n<=0||s.x>=cols-2){s.st={};teleport(s,r);}
}
function stepJoiner(s,r){
  /* seek structure; on contact, spur into it */
  let near=false;
  for(let d=0;d<4;d++){
    const i=(s.x+DX[d])+(s.y+DY[d])*cols;
    if(i>=0&&i<N&&chG[i]!==0){near=true;break;}
  }
  if(near){
    ink(s.x,s.y,"┼",inkColor(true,r));
    const d=Math.floor(r()*4);
    for(let k=1;k<=2+Math.floor(r()*3);k++){
      if(!ink(s.x+DX[d]*k,s.y+DY[d]*k,d%2===0?"─":"│",inkColor(false,r)))break;
    }
    teleport(s,r);
  }else{
    s.x+=DX[Math.floor(r()*4)];s.y+=DY[Math.floor(r()*4)];
    s.x=Math.max(1,Math.min(cols-2,s.x));
    s.y=Math.max(1,Math.min(rows-3,s.y));
  }
}
function teleport(s,r){
  for(let tries=0;tries<20;tries++){
    const x=1+Math.floor(r()*(cols-2)),y=1+Math.floor(r()*(rows-3));
    if(chG[x+y*cols]===0&&!voidM[x+y*cols]){s.x=x;s.y=y;s.dir=Math.floor(r()*4);return;}
  }
}

/* ---------- completion ---------- */
function checkCompletion(){
  coverage=inked/usable;
  if(phase==="WEAVING"&&coverage>=TARGET){
    phase="FINAL";
    hud={msg:"FINAL PASS",until:tick+120};
  }
  if(phase==="FINAL"){
    finalPass();
  }
}
let finalStep=0;
function finalPass(){
  /* seal the border, then sign, then HALT */
  const per=2*(cols-2)+2*(rows-3);
  const col=inkColor(true,null);
  for(let k=0;k<24&&finalStep<per;k++,finalStep++){
    let x,y,ch;
    const t=finalStep;
    if(t<cols-2){x=1+t;y=1;ch="═";}
    else if(t<cols-2+rows-3){x=cols-2;y=1+(t-(cols-2));ch="║";}
    else if(t<2*(cols-2)+rows-3){x=cols-2-(t-(cols-2)-(rows-3));y=rows-3;ch="═";}
    else{x=1;y=rows-3-(t-2*(cols-2)-(rows-3));ch="║";}
    const i=x+y*cols;
    chG[i]=ch.charCodeAt(0);rG[i]=col[0];gG[i]=col[1];bG[i]=col[2];ageG[i]=tick;
  }
  if(finalStep>=per){
    signWork();
    phase="HALT";
    haltAt=tick;
    scribes=[];
    hud={msg:"HALT · WORK COMPLETE",until:tick+1e9};
  }
}
function signWork(){
  const sig="LOOM · #"+HASH.slice(0,8)+" · "+inked+" MARKS · "+HARMONY;
  const x0=cols-3-sig.length,y0=rows-4;
  const col=hsl(curHue()+HARM_OFF,1,0.7);
  for(let i=0;i<sig.length;i++){
    const idx=(x0+i)+y0*cols;
    chG[idx]=sig.charCodeAt(i);rG[idx]=col[0];gG[idx]=col[1];bG[idx]=col[2];ageG[idx]=tick;
  }
}

/* ---------- tick ---------- */
function loomTick(){
  coverage=inked/usable;
  if(phase==="WEAVING"||phase==="FINAL"){
    for(const s of [...scribes]){
      if((tick+s.id)%tempo===0)stepScribe(s);
    }
    checkCompletion();
  }else if(phase==="HALT"){
    if(tick-haltAt>HALT_DWELL)beginScrub();
  }else if(phase==="UNWEAVE"){
    scrubTick();
  }
  if(embers.length)embers=embers.filter(em=>tick-em.t<28);
  tick++;
}

/* ---------- the unweaving: erase in reverse build order ---------- */
function beginScrub(){
  let mx=-1,mn=2e9;
  for(let i=0;i<N;i++){
    if(chG[i]===0)continue;
    if(ageG[i]>mx)mx=ageG[i];
    if(ageG[i]<mn)mn=ageG[i];
  }
  scrubClock=mx;scrubMin=mn;
  scrubStep=Math.max(1,(mx-mn+1)/SCRUB_TICKS);
  phase="UNWEAVE";
  hud={msg:"UNWEAVING",until:tick+120};
}
function scrubTick(){
  const lo=scrubClock-scrubStep;
  for(let i=0;i<N;i++){
    if(chG[i]===0)continue;
    if(ageG[i]>lo&&ageG[i]<=scrubClock){
      chG[i]=0;inked--;
      if(embers.length<3600&&((i*2654435761)>>>0)%100<35)
        embers.push({x:i%cols,y:Math.floor(i/cols),t:tick});
    }
  }
  scrubClock=lo;
  if(inked<=0||scrubClock<scrubMin-1){
    for(let i=0;i<N;i++)chG[i]=0;
    inked=0;
    cycle++;
    startCycle();
  }
}

/* ---------- interaction: commission a scribe ---------- */
cv.addEventListener("pointerdown",e=>{
  if(phase==="HALT"||phase==="UNWEAVE")return;
  if(scribes.length>=28)return;
  const x=Math.floor(e.clientX/CW),y=Math.floor(e.clientY/CH);
  const s=spawnScribe(x,y,null);
  hud={msg:"COMMISSIONED "+s.type+" #"+s.id,until:tick+60};
});
addEventListener("keydown",e=>{
  if(e.key==="r"||e.key==="R")build(newHash());
  else if(e.key==="s"||e.key==="S"){
    const a=document.createElement("a");
    a.download="loom_"+HASH.slice(0,8)+".png";a.href=cv.toDataURL("image/png");a.click();
  }
  else if(e.key==="1")tempo=14;
  else if(e.key==="2")tempo=8;
  else if(e.key==="3")tempo=3;
});

/* ---------- sizing ---------- */
function resize(){
  const dpr=Math.min(2,devicePixelRatio||1);
  cols=Math.floor(innerWidth/CW);rows=Math.floor(innerHeight/CH);
  N=cols*rows;
  cv.width=cols*CW*dpr;cv.height=rows*CH*dpr;
  cv.style.width=cols*CW+"px";cv.style.height=rows*CH+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.textBaseline="top";
  chG=new Uint16Array(N);
  rG=new Uint8ClampedArray(N);gG=new Uint8ClampedArray(N);bG=new Uint8ClampedArray(N);
  ageG=new Int32Array(N);voidM=new Uint8Array(N);
  if(HASH)build(HASH);            // a loom cannot be resized mid-weave; re-warp
}
addEventListener("resize",resize);

/* ---------- render ---------- */
function render(){
  ctx.fillStyle="#050608";
  ctx.fillRect(0,0,cols*CW,rows*CH);
  ctx.font="13px 'SF Mono',Menlo,Consolas,monospace";
  for(let y=0;y<rows;y++){
    const yy=y*CH;
    for(let x=0;x<cols;x++){
      const i=x+y*cols;
      if(chG[i]===0)continue;
      /* fresh ink runs white-hot and cools into its permanent hue */
      const cool=Math.min(1,(tick-ageG[i])/90);
      const r=Math.floor(rG[i]+(245-rG[i])*(1-cool));
      const g=Math.floor(gG[i]+(248-gG[i])*(1-cool));
      const b=Math.floor(bG[i]+(252-bG[i])*(1-cool));
      ctx.fillStyle="rgb("+r+","+g+","+b+")";
      ctx.fillText(String.fromCharCode(chG[i]),x*CW,yy);
    }
  }
  /* embers of the unweaving */
  if(embers.length){
    for(const em of embers){
      const f=1-(tick-em.t)/28;
      if(f<=0)continue;
      ctx.fillStyle="rgba(205,214,224,"+(0.35*f).toFixed(3)+")";
      ctx.fillText("·",em.x*CW,em.y*CH);
    }
  }
  /* scribe heads */
  if(phase==="WEAVING"||phase==="FINAL"){
    for(const s of scribes){
      const pul=0.55+0.45*Math.sin(tick*0.3+s.id);
      const col=inkColor(true,null);
      ctx.fillStyle="rgba("+col[0]+","+col[1]+","+col[2]+","+pul+")";
      ctx.fillText("▉",s.x*CW,s.y*CH);
    }
  }
  /* HUD */
  ctx.font="10px monospace";
  const hc=hsl(curHue(),1,0.62);
  ctx.fillStyle="rgba(150,158,166,0.6)";
  ctx.fillText("LOOM · C"+String(cycle).padStart(3,"0")+" · "+phase+" · WEAVE "+String(Math.floor(coverage*100)).padStart(2,"0")+
    "% · SCRIBES "+scribes.length+" · H"+String(Math.floor(((curHue()%360)+360)%360)).padStart(3,"0")+
    "·"+HARMONY+" · #"+HASH.slice(0,8),10,rows*CH-16);
  if(hud.until>tick){
    ctx.fillStyle="rgb("+hc[0]+","+hc[1]+","+hc[2]+")";
    ctx.fillText(hud.msg,cols*CW-10-ctx.measureText(hud.msg).width,rows*CH-16);
  }
}

/* ---------- fixed-clock loop ---------- */
function loop(ts){
  requestAnimationFrame(loop);
  if(!lastT)lastT=ts;
  acc+=ts-lastT;lastT=ts;
  let steps=0;
  while(acc>=TICK_MS&&steps<4){loomTick();acc-=TICK_MS;steps++;}
  if(acc>200)acc=0;
  if(steps>0)render();
}

/* ---------- boot ---------- */
resize();
build(location.hash?decodeURIComponent(location.hash.slice(1)):newHash());
requestAnimationFrame(loop);
</script>
</body>
</html>
