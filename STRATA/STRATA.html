<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STRATA v0.1.0</title>
<style>
  html,body{margin:0;height:100%;background:#04050a;overflow:hidden;}
  body{font-family:"SF Mono",Menlo,Consolas,monospace;cursor:ns-resize;}
  canvas{display:block;position:fixed;inset:0;}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;
    background:repeating-linear-gradient(to bottom,rgba(255,255,255,.016),
    rgba(255,255,255,.016) 1px,transparent 1px,transparent 3px);
    mix-blend-mode:overlay;opacity:.45;}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
"use strict";
/* ============================================================
   STRATA — series #14 (14_strata)
   The series' first moving camera: an endless descent through
   deterministic ASCII geology. Every cell is a pure function of
   (column, absolute depth, hash). Strata undulate, faults break
   and displace the columns beneath them, relic fragments lie
   entombed as inclusions. The bore never stops.
   Wheel to scrub · Space to hold · R reseed · S save plate.
   ============================================================ */

/* ---------- seeded PRNG / hash noise ---------- */
function cyrb128(str){let h1=1779033703,h2=3144134277,h3=1013904242,h4=2773480762;
  for(let i=0,k;i<str.length;i++){k=str.charCodeAt(i);
    h1=h2^Math.imul(h1^k,597399067);h2=h3^Math.imul(h2^k,2869860233);
    h3=h4^Math.imul(h3^k,951274213);h4=h1^Math.imul(h4^k,2716044179);}
  h1=Math.imul(h3^(h1>>>18),597399067);h2=Math.imul(h4^(h2>>>22),2869860233);
  h3=Math.imul(h1^(h3>>>17),951274213);h4=Math.imul(h2^(h4>>>19),2716044179);
  h1^=h2^h3^h4;h2^=h1;h3^=h1;h4^=h1;return[h1>>>0,h2>>>0,h3>>>0,h4>>>0];}
function sfc32(a,b,c,d){return function(){a>>>=0;b>>>=0;c>>>=0;d>>>=0;
  let t=(a+b)|0;a=b^b>>>9;b=c+(c<<3)|0;c=(c<<21|c>>>11)|0;d=d+1|0;t=t+d|0;c=c+t|0;
  return(t>>>0)/4294967296;};}
const B58="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
function newHash(){let s="oo";for(let i=0;i<49;i++)s+=B58[Math.floor(Math.random()*B58.length)];return s;}
function makeR(h){const s=cyrb128(h);return sfc32(s[0],s[1],s[2],s[3]);}
let SEEDN=0.1;
function h31(a,b,c){const n=Math.sin(a*127.1+b*311.7+c*74.7+SEEDN)*43758.5453;return n-Math.floor(n);}
function vn(x,y,salt){
  const xi=Math.floor(x),yi=Math.floor(y);
  const xf=x-xi,yf=y-yi;
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
  const a=h31(xi,yi,salt),b=h31(xi+1,yi,salt);
  const c2=h31(xi,yi+1,salt),d=h31(xi+1,yi+1,salt);
  return a+(b-a)*u+(c2-a)*v+(a-b-c2+d)*u*v;
}
function hsl(h,s,l){
  h=((h%360)+360)%360;
  const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m2=l-c/2;
  let r,g,b;
  if(h<60){r=c;g=x;b=0;}else if(h<120){r=x;g=c;b=0;}
  else if(h<180){r=0;g=c;b=x;}else if(h<240){r=0;g=x;b=c;}
  else if(h<300){r=x;g=0;b=c;}else{r=c;g=0;b=x;}
  return[Math.floor((r+m2)*255),Math.floor((g+m2)*255),Math.floor((b+m2)*255)];
}
const HEXC="0123456789ABCDEF";

/* ---------- grid / clock ---------- */
const CW=10,CH=16,TICK_MS=1000/30,FB=4;
let cols,rows,N;
const cv=document.getElementById("cv"),ctx=cv.getContext("2d");

/* ---------- token state ---------- */
let HASH,tick=0,acc=0,lastT=0,paused=false;
let HUE0=0,HARM="TRIAD",HOFF=120,DRIFTDIR=1;
let camDepth=0,userScroll=0,scrollVel=0;
const RATE=1.15/30;                     // rows of descent per tick (ambient)
const BASE=50;                          // mean stratum thickness (rows)
let layerMemo=new Map();
let hud={msg:"",until:0};

function build(hash){
  HASH=hash;
  const R=makeR(hash);
  SEEDN=R()*1000;
  HUE0=R()*360;
  HARM=["COMPLEMENT","TRIAD","SPLIT","ANALOG"][Math.floor(R()*4)];
  HOFF=HARM==="COMPLEMENT"?180:HARM==="TRIAD"?120:HARM==="SPLIT"?150:45;
  DRIFTDIR=R()<0.5?1:-1;
  camDepth=0;userScroll=0;scrollVel=0;tick=0;
  layerMemo=new Map();
  hud={msg:"BORE ENGAGED · "+HARM,until:tick+110};
}

/* ---------- stratigraphy ---------- */
/* monotone boundary sequence: b(i) = i*BASE + jitter */
function bDepth(i){return i*BASE+(h31(i,0,11)-0.5)*BASE*0.9;}
/* boundaries undulate per column */
function bAt(i,x){return bDepth(i)+ (vn(x*0.055,i*7.31,13)-0.5)*7;}

const MATS=["SEDIMENT","LAMINATE","CLASTIC","MASSIVE","ASHFALL","AQUIFER","CAVITY"];
function layerTraits(i){
  let L=layerMemo.get(i);
  if(L)return L;
  const w=[0.22,0.20,0.16,0.15,0.10,0.09,0.08];        // material weights
  let pickV=h31(i,1,17),mi=0,accu=0;
  for(let k=0;k<w.length;k++){accu+=w[k];if(pickV<accu){mi=k;break;}}
  L={
    i, mat:MATS[mi],
    hue:HUE0+i*137.508*DRIFTDIR,
    dens:0.35+h31(i,2,19)*0.5,
    code:"S"+String(((i%999)+999)%999).padStart(3,"0"),
    incl:buildInclusions(i)
  };
  layerMemo.set(i,L);
  if(layerMemo.size>200)layerMemo.delete(layerMemo.keys().next().value);
  return L;
}
/* which stratum contains (x, effective depth) */
function layerAt(x,de){
  let i=Math.floor(de/BASE);
  for(let k=i+2;k>=i-2;k--){
    if(bAt(k,x)<=de)return layerTraits(k);
  }
  return layerTraits(i-2);
}

/* ---------- faults: real displacement of everything beneath ---------- */
function faultShift(x,d){
  let s=0;
  const w=Math.floor(d/256);
  for(let ww=w-1;ww<=w;ww++){
    const n=h31(ww,3,23)<0.6?1:2;
    for(let f=0;f<n;f++){
      const fd=ww*256+h31(ww,f,29)*256;
      if(d<=fd)continue;
      const fx=h31(ww,f,31)*1.4-0.2;          // fault plane x (normalized, can sit offscreen)
      const throwR=3+h31(ww,f,37)*7;
      if(x/cols>fx)s+=throwR;
    }
  }
  return s;
}

/* ---------- inclusions: relic fragments entombed per stratum ---------- */
function buildInclusions(i){
  const out=[];
  const n=Math.floor(h31(i,4,41)*3.4);          // 0-3 per stratum
  for(let k=0;k<n;k++){
    const kind=Math.floor(h31(i,k,43)*3);       // frame, trace shard, tag
    out.push({
      kind,
      x:Math.floor(h31(i,k,47)*0.9*200),        // in a 200-col virtual band, wrapped
      dy:2+h31(i,k,53)*(BASE-8),                // rows below stratum top
      w:kind===0?4+Math.floor(h31(i,k,59)*10):kind===1?6+Math.floor(h31(i,k,61)*12):4,
      h:kind===0?2+Math.floor(h31(i,k,67)*3):1,
      seed:Math.floor(h31(i,k,71)*1e6)
    });
  }
  return out;
}
/* inclusion glyph at (x, rows-below-stratum-top), or null */
function inclusionAt(L,x,dy){
  for(const inc of L.incl){
    const ix=((x-inc.x)%200+200)%200;
    if(ix<0||ix>=inc.w)continue;
    const iy=dy-inc.dy;
    if(iy<0||iy>=inc.h+ (inc.kind===0?1:0))continue;
    if(inc.kind===0){ // frame
      const onEdge=ix===0||ix===inc.w-1||iy===0||iy===inc.h;
      if(!onEdge)return h31(inc.seed,ix,iy)<0.2?{ch:HEXC[Math.floor(h31(inc.seed,ix,iy+9)*16)],acc:true}:null;
      return {ch:iy===0||iy===inc.h?(ix===0||ix===inc.w-1?"╬":"═"):"║",acc:true};
    }
    if(inc.kind===1){ // trace shard
      if(iy!==0)return null;
      return {ch:ix===0||ix===inc.w-1?"■":(h31(inc.seed,ix,0)<0.14?"┼":"─"),acc:true};
    }
    // tag: 4 hex chars
    if(iy!==0||ix>=4)return null;
    return {ch:HEXC[Math.floor(h31(inc.seed,ix,3)*16)],acc:true};
  }
  return null;
}

/* ---------- material renderers: pure (x, de, L, t) ---------- */
const RAMP=" ·:;=+*#%▓█";
function matGlyph(L,x,de,t){
  const local=de-bDepth(L.i);
  if(L.mat==="SEDIMENT"){
    const v=vn(x*0.09,de*0.13,73)*L.dens*1.5;
    const gi=Math.floor(v*RAMP.length);
    return gi<1?null:{ch:RAMP[Math.min(RAMP.length-1,gi)],b:0.3+v*0.6};
  }
  if(L.mat==="LAMINATE"){
    const band=Math.floor(local)%3;
    if(band!==0)return h31(x,de,79)<0.05?{ch:"·",b:0.3}:null;
    if(h31(Math.floor(x/7),Math.floor(de),83)<0.12)return null;   // breaks
    return {ch:h31(x,de,89)<0.06?"╪":"─",b:0.55+vn(x*0.04,de*0.2,97)*0.35};
  }
  if(L.mat==="CLASTIC"){
    const cellv=h31(Math.floor(x/3),Math.floor(de/2),101);
    if(cellv>L.dens)return null;
    const q="▖▗▘▝▚▞▓"[Math.floor(h31(x,de,103)*7)];
    return {ch:q,b:0.35+cellv*0.55};
  }
  if(L.mat==="MASSIVE"){
    const cav=vn(x*0.07,de*0.09,107);
    if(cav>0.72)return null;                                       // vugs
    return {ch:cav>0.6?"▒":"▓",b:0.42+(0.72-cav)*0.5};
  }
  if(L.mat==="ASHFALL"){
    return h31(x,de,109)<0.10*L.dens*2?{ch:"·",b:0.35+h31(x,de,113)*0.3}:null;
  }
  if(L.mat==="AQUIFER"){
    const flow=Math.sin(x*0.42+t*2.6+de*0.6)*0.5+0.5;
    if(h31(x,de,127)>0.4+flow*0.4)return null;
    return {ch:flow>0.72?"≈":"~",b:0.4+flow*0.55,flow:true};
  }
  // CAVITY: open pocket; occasional falling drip
  const pocket=vn(x*0.05,L.i*3.7,131);
  if(pocket>0.35){
    const drip=(Math.floor(de*3+t*4)+x*7)%37===0;
    return drip?{ch:"·",b:0.5}:null;
  }
  return {ch:"▒",b:0.35};
}

/* ---------- input ---------- */
addEventListener("wheel",e=>{scrollVel+=e.deltaY*0.012;},{passive:true});
addEventListener("keydown",e=>{
  if(e.key==="r"||e.key==="R")build(newHash());
  else if(e.key===" "){e.preventDefault();paused=!paused;}
  else if(e.key==="s"||e.key==="S"){
    const a=document.createElement("a");
    a.download="strata_"+HASH.slice(0,8)+".png";a.href=cv.toDataURL("image/png");a.click();
  }
});

/* ---------- sizing ---------- */
function resize(){
  const dpr=Math.min(2,devicePixelRatio||1);
  cols=Math.floor(innerWidth/CW);rows=Math.floor(innerHeight/CH);
  N=cols*rows;
  cv.width=cols*CW*dpr;cv.height=rows*CH*dpr;
  cv.style.width=cols*CW+"px";cv.style.height=rows*CH+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.textBaseline="top";
}
addEventListener("resize",resize);

/* ---------- tick ---------- */
function strataTick(){
  if(!paused)camDepth+=RATE;
  userScroll+=scrollVel;scrollVel*=0.86;
  if(camDepth+userScroll<0)userScroll=-camDepth;
  tick++;
}

/* ---------- render ---------- */
function render(){
  const t=tick/30;
  const D=camDepth+userScroll;
  const sway=(vn(0.5,D*0.008,137)-0.5)*3;      // slow lateral camera drift
  ctx.fillStyle="#04050a";
  ctx.fillRect(0,0,cols*CW,rows*CH);

  /* under-glow bed: no black — each stratum tints its own ground */
  for(let br=0;br<rows;br+=FB){
    const d=D+br;
    for(let bc=0;bc<cols;bc+=FB){
      const x=bc+2;
      const de=d+faultShift(x,d);
      const L=layerAt(x,de);
      const col=hsl(L.hue,0.85,0.5);
      const k=0.055+vn(bc*0.1,d*0.05,139)*0.03;
      ctx.fillStyle="rgb("+Math.floor(col[0]*k)+","+Math.floor(col[1]*k)+","+Math.floor(col[2]*k)+")";
      ctx.fillRect(bc*CW,br*CH,FB*CW+1,FB*CH+1);
    }
  }

  ctx.font="13px 'SF Mono',Menlo,Consolas,monospace";
  const labels=[];
  for(let r=0;r<rows;r++){
    const d=D+r;
    const yy=r*CH;
    for(let c=0;c<cols;c++){
      const x=c+Math.floor(sway);
      const de=d+faultShift(x,d);
      const L=layerAt(x,de);
      const local=de-bDepth(L.i);

      /* boundary hairline: the first row of each stratum */
      const top=bAt(L.i,x);
      const isTop=de-top<1;

      let g=inclusionAt(L,x,Math.floor(local));
      if(!g)g=matGlyph(L,x,Math.floor(de),t);
      if(!g&&!isTop)continue;

      const acc=g&&g.acc;
      const col=hsl(L.hue+(acc?HOFF:0)+(vn(x*0.03,de*0.06,149)-0.5)*16,
                    acc?0.95:0.8,
                    isTop?0.68:0.34+(g?g.b*0.38:0));
      ctx.fillStyle="rgb("+col[0]+","+col[1]+","+col[2]+")";
      ctx.fillText(isTop&&!g?"╌":(g?g.ch:"╌"),c*CW,yy);
    }
    /* collect stratum labels at boundaries near the left rail */
    const deL=d+faultShift(8,d);
    const L2=layerAt(8,deL);
    if(deL-bAt(L2.i,8)<1&&r>2&&r<rows-4){
      labels.push({r,L:L2});
    }
  }

  /* stratum annotations */
  ctx.font="10px monospace";
  for(const lb of labels){
    const col=hsl(lb.L.hue+HOFF,0.9,0.66);
    ctx.fillStyle="rgb("+col[0]+","+col[1]+","+col[2]+")";
    ctx.fillText("▸ "+lb.L.code+" · "+lb.L.mat+" · H"+String(Math.floor(((lb.L.hue%360)+360)%360)).padStart(3,"0"),
      8,lb.r*CH+2);
  }

  /* depth rail (camera space, right side) */
  ctx.fillStyle="rgba(150,158,168,0.55)";
  for(let r=0;r<rows;r++){
    const d=Math.floor(D+r);
    if(d%10!==0)continue;
    const major=d%50===0;
    ctx.fillText(major?"┿":"╂",cols*CW-16,r*CH+2);
    if(major)ctx.fillText("−"+String(d*2).padStart(5,"0")+"m",cols*CW-70,r*CH+2);
  }

  /* HUD */
  ctx.fillStyle="rgba(150,158,168,0.6)";
  ctx.fillText("STRATA · DEPTH −"+String(Math.floor(D*2)).padStart(6,"0")+"m · "+
    (paused?"HOLD":"DESCENDING")+" · "+HARM+" · #"+HASH.slice(0,8),10,rows*CH-16);
  if(hud.until>tick){
    const hc=hsl(HUE0+HOFF,0.9,0.66);
    ctx.fillStyle="rgb("+hc[0]+","+hc[1]+","+hc[2]+")";
    ctx.fillText(hud.msg,cols*CW-10-ctx.measureText(hud.msg).width,rows*CH-16);
  }
}

/* ---------- fixed-clock loop ---------- */
function loop(ts){
  requestAnimationFrame(loop);
  if(!lastT)lastT=ts;
  acc+=ts-lastT;lastT=ts;
  let steps=0;
  while(acc>=TICK_MS&&steps<4){strataTick();acc-=TICK_MS;steps++;}
  if(acc>200)acc=0;
  if(steps>0)render();
}

/* ---------- boot ---------- */
resize();
build(location.hash?decodeURIComponent(location.hash.slice(1)):newHash());
requestAnimationFrame(loop);
</script>
</body>
</html>
