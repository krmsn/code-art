<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCENT v0.1.0</title>
<style>
  html,body{margin:0;height:100%;background:#04050a;overflow:hidden;}
  body{font-family:"SF Mono",Menlo,Consolas,monospace;cursor:ns-resize;}
  canvas{display:block;position:fixed;inset:0;}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;
    background:repeating-linear-gradient(to bottom,rgba(255,255,255,.014),
    rgba(255,255,255,.014) 1px,transparent 1px,transparent 3px);
    mix-blend-mode:overlay;opacity:.4;}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
"use strict";
/* ============================================================
   ASCENT — series #15 (15_ascent)
   STRATA inverted: the camera rises instead of drills.
   From a rooftop city band, up through birds and cloud decks,
   the blue deepening the whole way, into starfield and drifting
   hulls. Density thins to light. The rise never ends.
   After the closing pan of a certain space-western's last
   episode — the camera as the mourner, ascent as release.
   Deterministic per hash; parallax via altitude multipliers.
   Wheel to scrub · Space to hold · R reseed · S save plate.
   ============================================================ */

/* ---------- seeded PRNG / hash noise ---------- */
function cyrb128(str){let h1=1779033703,h2=3144134277,h3=1013904242,h4=2773480762;
  for(let i=0,k;i<str.length;i++){k=str.charCodeAt(i);
    h1=h2^Math.imul(h1^k,597399067);h2=h3^Math.imul(h2^k,2869860233);
    h3=h4^Math.imul(h3^k,951274213);h4=h1^Math.imul(h4^k,2716044179);}
  h1=Math.imul(h3^(h1>>>18),597399067);h2=Math.imul(h4^(h2>>>22),2869860233);
  h3=Math.imul(h1^(h3>>>17),951274213);h4=Math.imul(h2^(h4>>>19),2716044179);
  h1^=h2^h3^h4;h2^=h1;h3^=h1;h4^=h1;return[h1>>>0,h2>>>0,h3>>>0,h4>>>0];}
function sfc32(a,b,c,d){return function(){a>>>=0;b>>>=0;c>>>=0;d>>>=0;
  let t=(a+b)|0;a=b^b>>>9;b=c+(c<<3)|0;c=(c<<21|c>>>11)|0;d=d+1|0;t=t+d|0;c=c+t|0;
  return(t>>>0)/4294967296;};}
const B58="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
function newHash(){let s="oo";for(let i=0;i<49;i++)s+=B58[Math.floor(Math.random()*B58.length)];return s;}
function makeR(h){const s=cyrb128(h);return sfc32(s[0],s[1],s[2],s[3]);}
let SEEDN=0.1;
function h31(a,b,c){const n=Math.sin(a*127.1+b*311.7+c*74.7+SEEDN)*43758.5453;return n-Math.floor(n);}
function vn(x,y,salt){
  const xi=Math.floor(x),yi=Math.floor(y);
  const xf=x-xi,yf=y-yi;
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
  const a=h31(xi,yi,salt),b=h31(xi+1,yi,salt);
  const c2=h31(xi,yi+1,salt),d=h31(xi+1,yi+1,salt);
  return a+(b-a)*u+(c2-a)*v+(a-b-c2+d)*u*v;
}
function hsl(h,s,l){
  h=((h%360)+360)%360;s=Math.max(0,Math.min(1,s));l=Math.max(0,Math.min(1,l));
  const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m2=l-c/2;
  let r,g,b;
  if(h<60){r=c;g=x;b=0;}else if(h<120){r=x;g=c;b=0;}
  else if(h<180){r=0;g=c;b=x;}else if(h<240){r=0;g=x;b=c;}
  else if(h<300){r=x;g=0;b=c;}else{r=c;g=0;b=x;}
  return[Math.floor((r+m2)*255),Math.floor((g+m2)*255),Math.floor((b+m2)*255)];
}
const lerp=(a,b,t)=>a+(b-a)*t;
const HEXC="0123456789ABCDEF";

/* ---------- grid / clock ---------- */
const CW=10,CH=16,TICK_MS=1000/30,FB=4;
let cols,rows;
const cv=document.getElementById("cv"),ctx=cv.getContext("2d");

/* ---------- token state ---------- */
let HASH,tick=0,acc=0,lastT=0,paused=false;
let TOD="DUSK",HOFF=120,HARM="TRIAD";
let camAlt=0,userScroll=0,scrollVel=0;
const RATE=1.5/30;
let skyStops=[];
let objMemo=new Map();
let hud={msg:"",until:0};

function build(hash){
  HASH=hash;
  const R=makeR(hash);
  SEEDN=R()*1000;
  TOD=["DUSK","DUSK","NIGHTFALL","DAWN","NOON"][Math.floor(R()*5)];
  HARM=["COMPLEMENT","TRIAD","SPLIT","ANALOG"][Math.floor(R()*4)];
  HOFF=HARM==="COMPLEMENT"?180:HARM==="TRIAD"?120:HARM==="SPLIT"?150:45;
  /* the color story IS the gradient: [alt, hue, sat, light] */
  const horizon =
    TOD==="DUSK"     ? [26, 0.75, 0.34] :
    TOD==="NIGHTFALL"? [235,0.45, 0.14] :
    TOD==="DAWN"     ? [341,0.55, 0.30] :
                       [204,0.42, 0.52];
  skyStops=[
    [0,    horizon[0], horizon[1], horizon[2]],
    [140,  212, 0.58, TOD==="NOON"?0.42:0.28],
    [520,  221, 0.66, 0.20],
    [1050, 231, 0.68, 0.115],
    [1500, 234, 0.55, 0.055],
    [2100, 236, 0.40, 0.022],
  ];
  camAlt=0;userScroll=0;scrollVel=0;tick=0;
  objMemo=new Map();
  hud={msg:"ASCENT BEGINS · "+TOD,until:tick+110};
}

function skyColor(alt){
  let i=0;
  while(i<skyStops.length-2&&alt>skyStops[i+1][0])i++;
  const A=skyStops[i],B=skyStops[i+1];
  const t=Math.max(0,Math.min(1,(alt-A[0])/(B[0]-A[0])));
  return hsl(lerp(A[1],B[1],t),lerp(A[2],B[2],t),lerp(A[3],B[3],t));
}

/* ---------- the city band (alt 0 .. ~110) ---------- */
function cityHeight(bx){
  return 18+vn(bx*0.33,3.7,211)*62+vn(bx*0.09,9.1,213)*28;
}
function cityGlyph(x,alt,t){
  const bx=Math.floor(x/2);
  const H=cityHeight(bx);
  if(alt>H+8)return null;
  if(alt>H){
    /* antenna above some rooftops */
    if(h31(bx,0,217)<0.22&&Math.abs(x-bx*2)<1){
      const ah=2+h31(bx,1,219)*6;
      if(alt<=H+ah){
        const tip=alt>H+ah-1;
        return {ch:tip?"╽":"│",acc:tip&&Math.sin(t*2.4+bx)>0.2,b:tip?0.9:0.5};
      }
    }
    return null;
  }
  if(H-alt<1)return {ch:"▔",b:0.55};
  /* windows on a building grid */
  const win=(Math.floor(alt)%2===0)&&(x%3!==0);
  if(win){
    const lit=h31(x,Math.floor(alt),223)<(TOD==="NOON"?0.14:0.42);
    return lit?{ch:"▪",acc:h31(x,Math.floor(alt),227)<0.1,b:0.85}
              :{ch:"□",b:0.22};
  }
  return {ch:"▓",b:0.13};
}

/* ---------- clouds: two parallax decks ---------- */
function cloudAt(x,altL,salt){
  if(altL<330||altL>1120)return 0;
  const env=Math.sin(Math.PI*Math.min(1,Math.max(0,(altL-330)/790)));
  const d=vn(x*0.042,altL*0.045,salt)+vn(x*0.11,altL*0.11,salt+1)*0.4;
  return Math.max(0,d-1.02+env*0.55);
}

/* ---------- stars: two parallax fields ---------- */
function starAt(x,altL,salt,t){
  if(altL<1150)return null;
  const fade=Math.min(1,(altL-1150)/320);
  const cell=h31(x,Math.floor(altL),salt);
  if(cell>0.018*(salt===301?1:0.7))return null;
  const tw=0.55+0.45*Math.sin(t*(1.4+cell*90)+x*3.1);
  return {b:fade*tw,big:cell<0.003};
}

/* ---------- drifting objects in the high dark ---------- */
function objectsFor(w){
  let list=objMemo.get(w);
  if(list)return list;
  list=[];
  const n=h31(w,5,307)<0.55?1:(h31(w,6,308)<0.5?0:2);
  for(let k=0;k<n;k++){
    const kind=h31(w,k,311)<0.75?0:1;             // hull | relic frame
    list.push({
      kind,
      alt:w*230+40+h31(w,k,313)*160,
      x:Math.floor(h31(w,k,317)*180),
      w:kind===0?8+Math.floor(h31(w,k,319)*13):5+Math.floor(h31(w,k,323)*8),
      h:kind===0?2+Math.floor(h31(w,k,331)*2):3,
      seed:Math.floor(h31(w,k,337)*1e6),
      drift:(h31(w,k,341)-0.5)*0.9
    });
  }
  objMemo.set(w,list);
  if(objMemo.size>80)objMemo.delete(objMemo.keys().next().value);
  return list;
}
function objectAt(x,alt,t){
  if(alt<1350)return null;
  const w=Math.floor(alt/230);
  for(const ww of [w,w+1]){
    for(const o of objectsFor(ww)){
      const oy=Math.floor(alt-o.alt);
      if(oy<0||oy>o.h)continue;
      const ox=((x-Math.floor(o.x+t*o.drift))%180+180)%180;
      if(ox<0||ox>=o.w)continue;
      if(o.kind===1){ /* relic frame, floating now */
        const edge=ox===0||ox===o.w-1||oy===0||oy===o.h;
        if(!edge)return null;
        return {ch:oy===0||oy===o.h?(ox===0||ox===o.w-1?"╬":"═"):"║",acc:true,b:0.55};
      }
      /* hull */
      const edge=ox===0||ox===o.w-1||oy===0||oy===o.h;
      if(ox===o.w-1&&oy===1){ /* bow light blinks */
        const on=Math.sin(t*3+o.seed)>0.25;
        return {ch:"◆",acc:true,b:on?0.95:0.18};
      }
      if(edge)return {ch:oy===0||oy===o.h?"═":"║",b:0.42};
      return h31(o.seed,ox,oy)<0.3?{ch:"▓",b:0.3}:{ch:"·",b:0.2};
    }
  }
  return null;
}

/* ---------- birds in the low sky (drawn as overlay) ---------- */
function drawBirds(A,t){
  ctx.font="11px monospace";
  for(let k=0;k<9;k++){
    const balt=45+h31(k,7,347)*190;
    const r=rows-1-(balt-A);
    if(r<2||r>=rows-2)continue;
    const fade=1-Math.max(0,(balt-140)/100);
    if(fade<=0)continue;
    const bx=(h31(k,8,349)*cols+t*(2+h31(k,9,353)*4))%cols;
    const flap=Math.floor(t*4+k)%2===0;
    ctx.fillStyle="rgba(226,230,238,"+(0.6*fade).toFixed(3)+")";
    ctx.fillText(flap?"⌄":"^",Math.floor(bx)*CW,Math.floor(r)*CH);
  }
  ctx.font="13px 'SF Mono',Menlo,Consolas,monospace";
}

/* ---------- input ---------- */
addEventListener("wheel",e=>{scrollVel-=e.deltaY*0.012;},{passive:true});
addEventListener("keydown",e=>{
  if(e.key==="r"||e.key==="R")build(newHash());
  else if(e.key===" "){e.preventDefault();paused=!paused;}
  else if(e.key==="s"||e.key==="S"){
    const a=document.createElement("a");
    a.download="ascent_"+HASH.slice(0,8)+".png";a.href=cv.toDataURL("image/png");a.click();
  }
});

/* ---------- sizing ---------- */
function resize(){
  const dpr=Math.min(2,devicePixelRatio||1);
  cols=Math.floor(innerWidth/CW);rows=Math.floor(innerHeight/CH);
  cv.width=cols*CW*dpr;cv.height=rows*CH*dpr;
  cv.style.width=cols*CW+"px";cv.style.height=rows*CH+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.textBaseline="top";
}
addEventListener("resize",resize);

/* ---------- tick ---------- */
function ascentTick(){
  if(!paused)camAlt+=RATE;
  userScroll+=scrollVel;scrollVel*=0.86;
  if(camAlt+userScroll<0)userScroll=-camAlt;
  tick++;
}

/* ---------- render ---------- */
function render(){
  const t=tick/30;
  const A=camAlt+userScroll;
  const sway=(vn(0.5,A*0.006,359)-0.5)*2.4;

  /* the sky itself is the bed — the whole gradient, every frame */
  for(let br=0;br<rows;br+=FB){
    const alt=A+(rows-1-br);
    const c=skyColor(alt);
    ctx.fillStyle="rgb("+c[0]+","+c[1]+","+c[2]+")";
    ctx.fillRect(0,br*CH,cols*CW,FB*CH+1);
  }

  ctx.font="13px 'SF Mono',Menlo,Consolas,monospace";
  for(let r=0;r<rows;r++){
    const alt=A+(rows-1-r);
    const altFar=A*0.62+(rows-1-r);
    const yy=r*CH;
    const bed=skyColor(alt);
    for(let c=0;c<cols;c++){
      const x=c+Math.floor(sway);
      let g=null,col=null;

      /* near-to-far priority: city, near cloud, object, far cloud, stars */
      g=cityGlyph(x,alt,t);
      if(g){
        col=g.acc?hsl(skyStops[0][1]+HOFF,0.9,0.6)
                 :hsl(skyStops[0][1],0.35,0.10+g.b*0.5);
      }
      if(!g){
        const cn=cloudAt(x,alt,401);
        if(cn>0.02){
          const l=Math.min(0.85,0.3+cn*1.5+(TOD==="NOON"?0.2:0));
          g={ch:cn>0.3?"▓":cn>0.14?"▒":"░"};
          col=hsl(222,0.25,l);
        }
      }
      if(!g){
        g=objectAt(x,alt,t);
        if(g)col=g.acc?hsl(skyStops[0][1]+HOFF,0.95,0.35+g.b*0.35)
                      :hsl(228,0.2,0.18+g.b*0.4);
      }
      if(!g){
        const cf=cloudAt(x,altFar,403);
        if(cf>0.05){
          g={ch:cf>0.25?"▒":"░"};
          col=hsl(224,0.28,0.18+cf*0.8);
        }
      }
      if(!g){
        let st=starAt(x,alt,301,t);
        if(!st)st=starAt(x,altFar,303,t);
        if(st){
          g={ch:st.big?"+":"·"};
          col=hsl(50,st.big?0.35:0.1,0.5+st.b*0.5);
        }
      }
      if(!g&&alt>140&&alt<380&&h31(x,Math.floor(alt),409)<0.012){
        g={ch:"~"};col=hsl(215,0.3,0.4);   // thin low-sky wisps
      }
      if(!g)continue;
      /* skip glyphs that would vanish against the bed */
      if(Math.abs(col[0]-bed[0])+Math.abs(col[1]-bed[1])+Math.abs(col[2]-bed[2])<24)continue;
      ctx.fillStyle="rgb("+col[0]+","+col[1]+","+col[2]+")";
      ctx.fillText(g.ch,c*CW,yy);
    }
  }

  drawBirds(A,t);

  /* altitude rail */
  ctx.font="10px monospace";
  ctx.fillStyle="rgba(190,198,210,0.5)";
  for(let r=0;r<rows;r++){
    const alt=Math.floor(A+(rows-1-r));
    if(alt%10!==0)continue;
    const major=alt%50===0;
    ctx.fillText(major?"┿":"╂",cols*CW-16,r*CH+2);
    if(major)ctx.fillText("+"+String(alt*3).padStart(5,"0")+"m",cols*CW-70,r*CH+2);
  }

  /* HUD */
  ctx.fillStyle="rgba(190,198,210,0.55)";
  ctx.fillText("ASCENT · ALT +"+String(Math.floor(A*3)).padStart(6,"0")+"m · "+
    (paused?"HOLDING":"RISING")+" · "+TOD+" · "+HARM+" · #"+HASH.slice(0,8),10,rows*CH-16);
  if(hud.until>tick){
    const hc=hsl(skyStops[0][1]+HOFF,0.9,0.62);
    ctx.fillStyle="rgb("+hc[0]+","+hc[1]+","+hc[2]+")";
    ctx.fillText(hud.msg,cols*CW-10-ctx.measureText(hud.msg).width,rows*CH-16);
  }
}

/* ---------- fixed-clock loop ---------- */
function loop(ts){
  requestAnimationFrame(loop);
  if(!lastT)lastT=ts;
  acc+=ts-lastT;lastT=ts;
  let steps=0;
  while(acc>=TICK_MS&&steps<4){ascentTick();acc-=TICK_MS;steps++;}
  if(acc>200)acc=0;
  if(steps>0)render();
}

/* ---------- boot ---------- */
resize();
build(location.hash?decodeURIComponent(location.hash.slice(1)):newHash());
requestAnimationFrame(loop);
</script>
</body>
</html>
